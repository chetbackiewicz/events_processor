name: CI — Build and update manifests

on:
  push:
    branches: [main]
    paths:
      - "services/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingestion-api, processor]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz \
            | tar -xz && sudo mv kustomize /usr/local/bin/

      - name: Update image tags in Kustomize overlay
        run: |
          cd k8s/overlays/dev
          kustomize edit set image \
            ingestion-api=${{ secrets.DOCKERHUB_USERNAME }}/ingestion-api:${{ github.sha }}
          kustomize edit set image \
            processor=${{ secrets.DOCKERHUB_USERNAME }}/processor:${{ github.sha }}

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git commit -m "chore: update image tags to ${{ github.sha }}"
          git push
