apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: event-processor-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chetbackiewicz/demo.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: event-processor
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
