apiVersion: batch/v1
kind: CronJob
metadata:
  name: processor
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 120
      template:
        metadata:
          labels:
            app: processor
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: dockerhub-creds
          containers:
            - name: processor
              image: processor:latest
              env:
                - name: REDIS_HOST
                  value: redis
                - name: REDIS_PORT
                  value: "6379"
                - name: BATCH_SIZE
                  value: "50"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
